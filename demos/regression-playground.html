<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Regression — more data, better fit</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/dreampulse/computer-modern-web-font@master/fonts.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/jetbrains-mono@5.0.20/index.css" />
<style>
  :root {
    --bg:     #000000;
    --panel:  #0a0a0a;
    --border: #222222;
    --blue:   #58C4DD;
    --yellow: #FFF1B5;
    --green:  #83C167;
    --red:    #FC6255;
    --muted:  #888888;
    --white:  #FFFFFF;
    --serif:  'Computer Modern Serif', Georgia, serif;
    --mono:   'JetBrains Mono', Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    background: var(--bg);
    color: var(--white);
    font-family: var(--serif);
    height: 100%;
    overflow: hidden;
  }
  body {
    display: grid;
    grid-template-columns: 1fr 380px;
    grid-template-rows: auto 1fr;
    gap: 12px;
    padding: 16px 20px;
  }
  header {
    grid-column: 1 / -1;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  h1 {
    margin: 0;
    font-size: 1.3rem;
    color: var(--blue);
    font-weight: 400;
  }
  .subhead {
    color: var(--muted);
    font-family: var(--mono);
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* LEFT: plot */
  .plot-wrap {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px;
    position: relative;
  }
  #plot { display: block; width: 100%; height: 100%; }

  /* RIGHT: controls */
  .controls {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 1rem;
    font-family: var(--serif);
    overflow: auto;
  }
  .ctrl label {
    display: block;
    font-family: var(--mono);
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 0.3rem;
  }
  .ctrl .val {
    font-family: var(--mono);
    font-size: 1.15rem;
    color: var(--blue);
    margin-left: 0.5rem;
  }
  .ctrl input[type=range] {
    width: 100%;
    accent-color: var(--blue);
  }
  .row { display: flex; align-items: center; justify-content: space-between; margin-top: 2px; }

  .stats {
    font-family: var(--mono);
    font-size: 0.88rem;
    padding: 0.6rem 0;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    display: grid;
    grid-template-columns: auto 1fr auto 1fr;
    gap: 0.4rem 0.7rem;
    align-items: baseline;
  }
  .stats .k { color: var(--muted); font-size: 0.7rem; letter-spacing: 0.08em; text-transform: uppercase; }
  .stats .v-truth { color: var(--yellow); }
  .stats .v-fit   { color: var(--green); }

  .mse-box {
    display: flex;
    flex-direction: column;
    gap: 0.2rem;
  }
  .mse-box .mse-label {
    font-family: var(--mono);
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
  }
  .mse-box .mse-val {
    font-family: var(--mono);
    font-size: 1.5rem;
    color: var(--yellow);
  }

  .mini-plot-wrap {
    background: #050505;
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 6px;
  }
  .mini-plot-wrap .title {
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 2px;
  }
  #mini { width: 100%; height: 110px; display: block; }

  .legend {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--muted);
    display: flex;
    gap: 0.9rem;
    flex-wrap: wrap;
  }
  .legend .swatch {
    display: inline-block;
    width: 14px; height: 2px;
    vertical-align: middle;
    margin-right: 4px;
  }
  .legend .dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-right: 4px;
    vertical-align: middle;
  }

  .btn {
    background: #0a0a0a;
    border: 1px solid var(--blue);
    color: var(--blue);
    font-family: var(--mono);
    font-size: 0.8rem;
    padding: 0.45rem 0.8rem;
    border-radius: 2px;
    cursor: pointer;
    letter-spacing: 0.05em;
  }
  .btn:hover { background: var(--blue); color: #000; }
</style>
</head>
<body>

<header>
  <h1>Linear regression — more data, better fit</h1>
  <span class="subhead">slide N &middot; resample to see variance</span>
</header>

<div class="plot-wrap">
  <svg id="plot" viewBox="0 0 760 540" preserveAspectRatio="xMidYMid meet"></svg>
</div>

<div class="controls">
  <div class="ctrl">
    <div class="row">
      <label>Training samples&nbsp;(N)</label>
      <span class="val" id="n-val">1</span>
    </div>
    <input type="range" id="n" min="1" max="100" step="1" value="1"/>
  </div>

  <div class="ctrl">
    <div class="row">
      <label>Noise&nbsp;(&sigma;)</label>
      <span class="val" id="sd-val">1.8</span>
    </div>
    <input type="range" id="sd" min="0" max="40" step="1" value="18"/>
  </div>

  <div class="stats">
    <span class="k">truth</span>
    <span class="v-truth" id="truth">w = 2.00,&nbsp; b = 1.00</span>
    <span class="k">fit</span>
    <span class="v-fit" id="fit">—</span>
  </div>

  <div class="mse-box">
    <span class="mse-label">MSE on held-out data</span>
    <span class="mse-val" id="mse">—</span>
  </div>

  <div class="mini-plot-wrap">
    <div class="title">||&beta;&#770; &minus; &beta;|| vs. N&nbsp;&nbsp;<span style="color:#888">(convergence)</span></div>
    <svg id="mini" viewBox="0 0 320 110" preserveAspectRatio="none"></svg>
  </div>

  <div class="legend">
    <span><span class="dot" style="background:#58C4DD"></span>data point</span>
    <span><span class="swatch" style="background:#FFF1B5; border-top:2px dashed #FFF1B5; height:0;"></span>true line</span>
    <span><span class="swatch" style="background:#83C167;"></span>fit</span>
  </div>

  <button class="btn" id="resample">resample data</button>
</div>

<script>
// ──────────── seeded RNG ────────────
function mulberry32(seed) {
  return function () {
    seed |= 0; seed = (seed + 0x6D2B79F5) | 0;
    let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function makeGauss(rng) {
  return function () {
    const u1 = Math.max(rng(), 1e-12), u2 = rng();
    return Math.sqrt(-2 * Math.log(u1)) * Math.cos(2 * Math.PI * u2);
  };
}

const TRUE_W = 2.0;
const TRUE_B = 1.0;
const X_MIN = -4, X_MAX = 4;
const Y_MIN = -12, Y_MAX = 14;
const N_POOL = 500;

let seed = 1;
let pool = [];

function regeneratePool(sd, sig) {
  const rng = mulberry32(sd);
  const g = makeGauss(rng);
  pool = [];
  for (let i = 0; i < N_POOL; i++) {
    const x = X_MIN + (X_MAX - X_MIN) * rng();
    const y = TRUE_W * x + TRUE_B + sig * g();
    pool.push({ x, y });
  }
}

function fit(pts) {
  const n = pts.length;
  if (n < 2) return { w: 0, b: 0 };
  let sx = 0, sy = 0;
  for (const p of pts) { sx += p.x; sy += p.y; }
  const mx = sx / n, my = sy / n;
  let num = 0, den = 0;
  for (const p of pts) {
    const dx = p.x - mx;
    num += dx * (p.y - my);
    den += dx * dx;
  }
  const w = den < 1e-9 ? 0 : num / den;
  const b = my - w * mx;
  return { w, b };
}

function mseOnTruth(w, b) {
  // MSE against the true underlying relationship, averaged over x
  // = integral over uniform x of ((w-W)x + (b-B))^2 + σ^2
  // which for uniform [X_MIN, X_MAX] has a closed form:
  const dw = w - TRUE_W;
  const db = b - TRUE_B;
  const len = X_MAX - X_MIN;
  const meanX = (X_MAX + X_MIN) / 2;
  const meanX2 = (X_MAX*X_MAX + X_MAX*X_MIN + X_MIN*X_MIN) / 3;
  return dw*dw*meanX2 + 2*dw*db*meanX + db*db;
}

// ──────────── SVG helpers ────────────
const plot = document.getElementById('plot');
const PW = 760, PH = 540;
const PAD_L = 55, PAD_R = 20, PAD_T = 20, PAD_B = 40;
const toSvgX = x => PAD_L + ((x - X_MIN) / (X_MAX - X_MIN)) * (PW - PAD_L - PAD_R);
const toSvgY = y => PH - PAD_B - ((y - Y_MIN) / (Y_MAX - Y_MIN)) * (PH - PAD_T - PAD_B);
function clearSvg(el) { while (el.firstChild) el.removeChild(el.firstChild); }
function el(tag, attrs) {
  const n = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const k in attrs) n.setAttribute(k, attrs[k]);
  return n;
}

function drawPlot(visible, fitWB) {
  clearSvg(plot);

  // gridlines
  for (let gx = X_MIN; gx <= X_MAX; gx++) {
    plot.appendChild(el('line', {
      x1: toSvgX(gx), x2: toSvgX(gx),
      y1: PAD_T, y2: PH - PAD_B, stroke: '#141414'
    }));
  }
  for (let gy = -10; gy <= 14; gy += 4) {
    plot.appendChild(el('line', {
      x1: PAD_L, x2: PW - PAD_R,
      y1: toSvgY(gy), y2: toSvgY(gy), stroke: '#141414'
    }));
  }

  // axes (at 0)
  plot.appendChild(el('line', { x1: PAD_L, x2: PW - PAD_R, y1: toSvgY(0), y2: toSvgY(0), stroke: '#444', 'stroke-width':'1.5' }));
  plot.appendChild(el('line', { x1: toSvgX(0), x2: toSvgX(0), y1: PAD_T, y2: PH - PAD_B, stroke: '#444', 'stroke-width':'1.5' }));

  // axis labels
  const xLab = el('text', { x: PW-25, y: toSvgY(0) - 6, fill: '#888',
    'text-anchor':'end', 'font-family':'JetBrains Mono,monospace', 'font-size':'11'});
  xLab.textContent = 'x'; plot.appendChild(xLab);
  const yLab = el('text', { x: toSvgX(0) + 8, y: PAD_T + 14, fill: '#888',
    'font-family':'JetBrains Mono,monospace', 'font-size':'11'});
  yLab.textContent = 'y'; plot.appendChild(yLab);

  // true line (yellow, dashed)
  plot.appendChild(el('line', {
    x1: toSvgX(X_MIN), y1: toSvgY(TRUE_W * X_MIN + TRUE_B),
    x2: toSvgX(X_MAX), y2: toSvgY(TRUE_W * X_MAX + TRUE_B),
    stroke: '#FFF1B5', 'stroke-width': '2', 'stroke-dasharray':'6,5'
  }));

  // scatter
  for (const p of visible) {
    plot.appendChild(el('circle', {
      cx: toSvgX(p.x), cy: toSvgY(p.y), r: 3.2, fill: '#58C4DD', 'fill-opacity':'0.85'
    }));
  }

  // fit line (green)
  if (visible.length >= 2) {
    plot.appendChild(el('line', {
      x1: toSvgX(X_MIN), y1: toSvgY(fitWB.w * X_MIN + fitWB.b),
      x2: toSvgX(X_MAX), y2: toSvgY(fitWB.w * X_MAX + fitWB.b),
      stroke: '#83C167', 'stroke-width': '3'
    }));
  }
}

// ──────────── Mini plot: convergence vs N ────────────
const mini = document.getElementById('mini');
function drawMini(currentN, sig) {
  clearSvg(mini);
  const W = 320, H = 110, PAD = 18;
  const Ns = [2, 3, 5, 10, 20, 50, 100];
  const errs = [];
  for (const nn of Ns) {
    const pts = pool.slice(0, nn);
    const wb = fit(pts);
    const dw = wb.w - TRUE_W;
    const db = wb.b - TRUE_B;
    errs.push(Math.sqrt(dw*dw + db*db));
  }
  const maxErr = Math.max(...errs, 0.01);

  const toX = n => PAD + (Math.log10(n) / Math.log10(100)) * (W - 2*PAD);
  const toY = v => H - PAD - (v / (maxErr * 1.1)) * (H - 2*PAD);

  // axis
  mini.appendChild(el('line', { x1: PAD, x2: W-PAD, y1: H-PAD, y2: H-PAD, stroke: '#333' }));

  // curve
  const pts = Ns.map((n, i) => `${toX(n).toFixed(1)},${toY(errs[i]).toFixed(1)}`).join(' ');
  mini.appendChild(el('polyline', { points: pts, fill: 'none', stroke: '#83C167', 'stroke-width': 1.8 }));

  // current N marker (clamped to the tracked range)
  const x = toX(Math.max(2, Math.min(100, currentN)));
  mini.appendChild(el('line', { x1: x, x2: x, y1: PAD, y2: H-PAD, stroke: '#888', 'stroke-dasharray': '3,3' }));

  // x-labels (logarithmic)
  for (const nn of [2, 10, 100]) {
    const t = el('text', { x: toX(nn), y: H - 4, fill: '#666', 'text-anchor':'middle',
                           'font-family':'JetBrains Mono,monospace', 'font-size':'9' });
    t.textContent = nn;
    mini.appendChild(t);
  }
}

// ──────────── Update pipeline ────────────
const nEl     = document.getElementById('n');
const sdEl    = document.getElementById('sd');
const nVal    = document.getElementById('n-val');
const sdVal   = document.getElementById('sd-val');
const fitEl   = document.getElementById('fit');
const mseEl   = document.getElementById('mse');
const btn     = document.getElementById('resample');

function update() {
  const n = parseInt(nEl.value, 10);
  const sig = parseInt(sdEl.value, 10) / 10;
  nVal.textContent = n;
  sdVal.textContent = sig.toFixed(1);

  // Regenerate pool when noise changes (same seed, new variance)
  regeneratePool(seed, sig);

  const visible = pool.slice(0, n);
  const wb = fit(visible);
  drawPlot(visible, wb);

  if (n >= 2) {
    fitEl.textContent = `w = ${wb.w.toFixed(3)},  b = ${wb.b.toFixed(3)}`;
    mseEl.textContent = mseOnTruth(wb.w, wb.b).toFixed(3);
  } else {
    fitEl.textContent = '—';
    mseEl.textContent = '—';
  }

  drawMini(n, sig);
}

nEl.addEventListener('input', update);
sdEl.addEventListener('input', update);
btn.addEventListener('click', () => {
  seed = (seed + 1) | 0;
  update();
});

regeneratePool(seed, parseInt(sdEl.value, 10) / 10);
update();
</script>
</body>
</html>
