<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Token Predictor</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/dreampulse/computer-modern-web-font@master/fonts.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/jetbrains-mono@5.0.20/index.css" />
<style>
  :root {
    --bg:     #000000;
    --panel:  #0a0a0a;
    --border: #222222;
    --blue:   #58C4DD;
    --yellow: #FFF1B5;
    --green:  #83C167;
    --red:    #FC6255;
    --muted:  #888888;
    --gold:   #FFC107;
    --white:  #FFFFFF;
    --serif:  'Computer Modern Serif', Georgia, serif;
    --mono:   'JetBrains Mono', Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    background: var(--bg);
    color: var(--white);
    font-family: var(--serif);
    height: 100%;
    overflow: hidden;
  }
  body {
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 10px;
    padding: 14px 20px;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
  }
  .mode-tabs {
    display: flex;
    border: 1px solid var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  .mode-tabs button {
    background: transparent;
    color: var(--muted);
    border: none;
    padding: 0.45rem 1rem;
    font-family: var(--mono);
    font-size: 0.75rem;
    letter-spacing: 0.08em;
    cursor: pointer;
  }
  .mode-tabs button.active { background: var(--blue); color: #000; }
  .mode-label {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  h1 {
    font-size: 1.3rem;
    font-weight: 400;
    margin: 0;
    color: var(--blue);
  }

  main {
    display: grid;
    grid-template-columns: 55fr 45fr;
    gap: 14px;
    min-height: 0;
  }
  .text-panel, .bars-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 14px 16px;
    overflow: auto;
  }

  /* ── TRAINING UI ── */

  .corpus-header {
    font-family: var(--mono);
    font-size: 0.68rem;
    letter-spacing: 0.14em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 0.6rem;
  }
  .corpus-line {
    font-family: var(--mono);
    font-size: 0.82rem;
    line-height: 1.9;
    color: #555;
    padding: 0.1rem 0;
    transition: opacity 0.3s;
  }
  .corpus-line.match { color: var(--white); }
  .corpus-line .prefix  { color: var(--blue); }
  .corpus-line .nextw   { color: var(--yellow); background: rgba(255,241,181,0.12); padding: 0.1rem 0.3rem; border-radius: 2px; }
  .corpus-line .rest    { color: #555; }
  .corpus-line.nomatch  { opacity: 0.25; }

  .predict-box {
    margin-top: 1rem;
    padding: 0.8rem 1rem;
    background: rgba(88,196,221,0.06);
    border: 1px dashed var(--blue);
    border-radius: 4px;
    font-family: var(--mono);
    font-size: 1.05rem;
    text-align: center;
  }
  .predict-box .ctx { color: var(--blue); }
  .predict-box .blank { color: var(--yellow); }

  .result-line {
    margin-top: 0.7rem;
    font-family: var(--mono);
    font-size: 0.9rem;
    text-align: center;
    min-height: 1.5em;
  }

  /* ── INFERENCE UI ── */

  .system-prompt {
    background: rgba(131, 193, 103, 0.08);
    border-left: 3px solid var(--green);
    padding: 0.6rem 0.8rem;
    margin-bottom: 1rem;
    font-family: var(--mono);
    font-size: 0.8rem;
    color: var(--green);
    line-height: 1.5;
    border-radius: 2px;
  }
  .system-prompt.hidden { display: none; }
  .sentence {
    font-family: var(--mono);
    font-size: 0.95rem;
    line-height: 1.8;
    color: var(--white);
    white-space: pre-wrap;
  }
  .sentence .user-msg { color: var(--blue); }
  .sentence .ai-label { color: var(--green); }
  .sentence .cursor   { color: var(--yellow); animation: blink 1s steps(2) infinite; }
  @keyframes blink { 50% { opacity: 0; } }
  .toggle {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--muted);
    cursor: pointer;
    letter-spacing: 0.05em;
    user-select: none;
    display: inline-block;
    margin-bottom: 0.8rem;
  }
  .toggle input { accent-color: var(--blue); margin-right: 0.3rem; }

  /* ── BARS ── */

  .bars-panel .title {
    font-family: var(--mono);
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 0.8rem;
  }
  .bar-row {
    display: grid;
    grid-template-columns: 110px 1fr 60px;
    align-items: center;
    gap: 0.5rem;
    font-family: var(--mono);
    font-size: 0.85rem;
    margin: 0.45rem 0;
  }
  .bar-row .word { color: var(--white); text-align: right; }
  .bar-row.top .word { color: var(--yellow); }
  .bar-row .bar-outer {
    height: 14px;
    background: #050505;
    border: 1px solid #1a1a1a;
    border-radius: 2px;
    overflow: hidden;
  }
  .bar-row .bar-inner {
    height: 100%;
    background: var(--blue);
    width: 0;
    transition: width 0.6s ease-out;
  }
  .bar-row.top .bar-inner { background: var(--yellow); }
  .bar-row .pct { color: var(--muted); font-size: 0.75rem; text-align: right; }
  .bar-row .count {
    font-size: 0.7rem;
    color: var(--muted);
    text-align: right;
    grid-column: 3;
    margin-top: -0.3rem;
  }

  /* ── FOOTER ── */

  footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
    padding: 0 2px;
  }
  .footer-left, .footer-right {
    display: flex;
    gap: 0.6rem;
    align-items: center;
    flex-wrap: wrap;
  }
  .btn {
    background: #050505;
    border: 1px solid var(--blue);
    color: var(--blue);
    font-family: var(--mono);
    font-size: 0.8rem;
    padding: 0.5rem 1rem;
    border-radius: 2px;
    cursor: pointer;
    letter-spacing: 0.06em;
  }
  .btn.primary { background: var(--blue); color: #000; }
  .btn.advance { border-color: var(--green); color: var(--green); }
  .btn.advance.primary { background: var(--green); color: #000; }
  .btn:hover   { filter: brightness(1.15); }
  .btn:disabled {
    opacity: 0.35; cursor: not-allowed;
    background: #050505; color: var(--muted); border-color: var(--muted);
  }
  .speed-group {
    display: flex;
    border: 1px solid var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  .speed-group button {
    background: transparent;
    color: var(--muted);
    border: none;
    padding: 0.4rem 0.7rem;
    font-family: var(--mono);
    font-size: 0.7rem;
    cursor: pointer;
    letter-spacing: 0.05em;
  }
  .speed-group button.active { background: var(--blue); color: #000; }
</style>
</head>
<body>

<header>
  <div style="display:flex; align-items:center; gap:1rem; flex-wrap:wrap;">
    <h1>Token predictor</h1>
    <span class="mode-label" id="mode-label">MODE: TRAINING — counting patterns</span>
  </div>
  <div class="mode-tabs">
    <button id="tab-train"  class="active">TRAINING</button>
    <button id="tab-infer">INFERENCE</button>
  </div>
</header>

<main>
  <div class="text-panel">
    <!-- TRAINING UI -->
    <div id="train-ui">
      <div class="corpus-header" id="corpus-header">training corpus</div>
      <div id="corpus-lines"></div>
      <div class="predict-box" id="predict-box"></div>
      <div class="result-line" id="result-line"></div>
    </div>

    <!-- INFERENCE UI -->
    <div id="infer-ui" style="display:none;">
      <label class="toggle">
        <input type="checkbox" id="show-sys" checked/>show system prompt
      </label>
      <div class="system-prompt" id="system-prompt">
        [SYSTEM]: What follows is a conversation between a user and a helpful AI assistant.
      </div>
      <div class="sentence" id="infer-sentence"></div>
    </div>
  </div>

  <div class="bars-panel">
    <div class="title" id="bars-title">next-word probability</div>
    <div id="bars"></div>
  </div>
</main>

<footer>
  <div class="footer-left">
    <button class="btn primary" id="act-primary">Predict →</button>
    <button class="btn advance" id="act-next" disabled>Next word →</button>
    <button class="btn" id="act-reset">Reset</button>
  </div>
  <div class="footer-right">
    <span class="mode-label">speed:</span>
    <div class="speed-group">
      <button id="spd-manual" class="active">MANUAL</button>
      <button id="spd-slow">AUTO SLOW</button>
      <button id="spd-fast">AUTO FAST</button>
    </div>
  </div>
</footer>

<script>
// ─────────────────────────────────────────────────────────────
// TRAINING DATA — a small corpus of sentences.
// The model "learns" by counting next-word frequencies given a prefix.
// ─────────────────────────────────────────────────────────────

const CORPUS = [
  "the quick brown fox jumps over the lazy dog",
  "the quick brown fox ran through the forest",
  "the quick brown bear caught a fish",
  "the quick brown dog chased its tail",
  "the quick red fox hid behind the tree",
  "the quick old man walked to the store",
  "the quick lazy cat slept all day",
  "a quick brown bird flew over the lake",
  "the slow brown fox sat in the sun",
  "the quick brown fox jumps over fences easily",
  "the happy brown fox played in the meadow",
  "the quick young fox explored the riverbank",
];

// The target sentence we're predicting through:
const TARGET = "the quick brown fox jumps over the lazy dog";
const TARGET_WORDS = TARGET.split(' ');

// Prediction steps: we predict words at positions 2, 3, 4 (0-indexed)
// giving context lengths of 2, 3, 4 words respectively.
const STEPS = [
  { pos: 2, ctxLen: 2 },   // context: "the quick" → predict "brown"
  { pos: 3, ctxLen: 3 },   // context: "the quick brown" → predict "fox"
  { pos: 4, ctxLen: 4 },   // context: "the quick brown fox" → predict "jumps"
];

function getPrefix(step) {
  return TARGET_WORDS.slice(0, STEPS[step].pos);
}

function getTarget(step) {
  return TARGET_WORDS[STEPS[step].pos];
}

// Find corpus sentences matching a prefix; return {matching, counts, total}
function matchCorpus(prefix) {
  const pStr = prefix.join(' ');
  const matching = [];
  const counts = {};
  let total = 0;

  for (const sent of CORPUS) {
    const words = sent.split(' ');
    const sentPrefix = words.slice(0, prefix.length).join(' ');
    if (sentPrefix === pStr && words.length > prefix.length) {
      const nextWord = words[prefix.length];
      matching.push({ words, nextWord });
      counts[nextWord] = (counts[nextWord] || 0) + 1;
      total++;
    }
  }

  // Sort by count descending
  const ranked = Object.entries(counts)
    .map(([word, count]) => ({ word, count, p: count / total }))
    .sort((a, b) => b.count - a.count);

  return { matching, ranked, total };
}

// ─────────────────────────────────────────────────────────────
// INFERENCE DATA (scripted response, unchanged)
// ─────────────────────────────────────────────────────────────

const INFER_PROMPT = "What are some promising areas in synthetic biology?";
const INFER_STEPS = [
  { candidates: [
    { word: 'There',   p: 0.45 }, { word: 'Some',    p: 0.22 }, { word: 'The',     p: 0.18 },
    { word: 'A',       p: 0.07 }, { word: 'Several', p: 0.05 }, { word: 'Many',    p: 0.03 },
  ]},
  { candidates: [
    { word: 'are',  p: 0.71 }, { word: 'is',   p: 0.12 }, { word: 'were', p: 0.08 },
    { word: 'have', p: 0.05 }, { word: 'exist',p: 0.03 }, { word: "'s",   p: 0.01 },
  ]},
  { candidates: [
    { word: 'several',  p: 0.38 }, { word: 'many',     p: 0.27 },
    { word: 'a',        p: 0.16 }, { word: 'exciting', p: 0.09 },
    { word: 'promising',p: 0.07 }, { word: 'genuine',  p: 0.03 },
  ]},
  { candidates: [
    { word: 'promising',p: 0.41 }, { word: 'exciting', p: 0.25 },
    { word: 'active',   p: 0.14 }, { word: 'compelling',p: 0.09 },
    { word: 'emerging', p: 0.08 }, { word: 'important',p: 0.03 },
  ]},
  { candidates: [
    { word: 'areas',       p: 0.63 }, { word: 'directions',p: 0.15 },
    { word: 'applications',p: 0.10 }, { word: 'domains',   p: 0.06 },
    { word: 'frontiers',   p: 0.04 }, { word: 'fields',    p: 0.02 },
  ]},
  { candidates: [
    { word: ',',    p: 0.47 }, { word: 'in',    p: 0.33 }, { word: 'of',   p: 0.09 },
    { word: 'that',  p: 0.06 }, { word: 'for',  p: 0.03 }, { word: 'to',    p: 0.02 },
  ]},
  { candidates: [
    { word: 'including',p: 0.38 }, { word: 'notably',   p: 0.22 },
    { word: 'such',     p: 0.17 }, { word: 'for',       p: 0.12 },
    { word: 'ranging',  p: 0.08 }, { word: 'from',      p: 0.03 },
  ]},
  { candidates: [
    { word: 'gene',      p: 0.28 }, { word: 'protein',   p: 0.21 },
    { word: 'cell',      p: 0.18 }, { word: 'CRISPR',    p: 0.14 },
    { word: 'metabolic', p: 0.11 }, { word: 'synthetic', p: 0.08 },
  ]},
  { candidates: [
    { word: 'editing',   p: 0.52 }, { word: 'therapy',   p: 0.20 },
    { word: 'design',    p: 0.14 }, { word: 'circuits',  p: 0.08 },
    { word: 'engineering',p: 0.04 }, { word: 'discovery',p: 0.02 },
  ]},
  { candidates: [
    { word: ',',    p: 0.56 }, { word: 'and',  p: 0.33 }, { word: '.',    p: 0.06 },
    { word: ';',    p: 0.02 }, { word: ':',    p: 0.02 }, { word: '—',    p: 0.01 },
  ]},
  { candidates: [
    { word: 'protein',  p: 0.31 }, { word: 'metabolic',p: 0.24 },
    { word: 'cell',     p: 0.18 }, { word: 'synthetic',p: 0.13 },
    { word: 'genome',   p: 0.09 }, { word: 'directed', p: 0.05 },
  ]},
  { candidates: [
    { word: 'design',    p: 0.46 }, { word: 'engineering',p: 0.28 },
    { word: 'discovery', p: 0.12 }, { word: 'folding',   p: 0.08 },
    { word: 'synthesis', p: 0.04 }, { word: 'language',  p: 0.02 },
  ]},
  { candidates: [
    { word: '.',    p: 0.62 }, { word: ',',    p: 0.22 }, { word: ';',    p: 0.08 },
    { word: 'more', p: 0.05 }, { word: 'or',   p: 0.02 }, { word: 'and',  p: 0.01 },
  ]},
];

// ─────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────

let mode = 'train';
let tStep = 0;               // which prediction step (0..2)
let tRevealed = false;       // has the user clicked "Predict" for this step?
let inferStep = 0;
let inferTokens = [];
let speed = 'manual';
let autoTimer = null;

// ─────────── DOM ───────────
const $ = id => document.getElementById(id);
const modeLabel    = $('mode-label');
const tabTrain     = $('tab-train');
const tabInfer     = $('tab-infer');
const trainUI      = $('train-ui');
const inferUI      = $('infer-ui');
const corpusHeader = $('corpus-header');
const corpusLines  = $('corpus-lines');
const predictBox   = $('predict-box');
const resultLine   = $('result-line');
const inferSentence= $('infer-sentence');
const showSys      = $('show-sys');
const systemPrompt = $('system-prompt');
const bars         = $('bars');
const barsTitle    = $('bars-title');
const btnPrimary   = $('act-primary');
const btnNext      = $('act-next');
const btnReset     = $('act-reset');
const spdBtns = { manual: $('spd-manual'), slow: $('spd-slow'), fast: $('spd-fast') };

// ─────────── Rendering ───────────

function esc(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function renderTrainBars(ranked, total) {
  bars.innerHTML = '';
  barsTitle.textContent = `next-word probability (${total} matching sentence${total === 1 ? '' : 's'})`;
  ranked.forEach((r, i) => {
    const row = document.createElement('div');
    row.className = 'bar-row' + (i === 0 ? ' top' : '');
    row.innerHTML = `
      <div class="word">${esc(r.word)}</div>
      <div class="bar-outer"><div class="bar-inner" style="width:0%"></div></div>
      <div class="pct">${(r.p * 100).toFixed(0)}%&ensp;<span style="color:#555">(${r.count}/${total})</span></div>
    `;
    bars.appendChild(row);
  });
  requestAnimationFrame(() => {
    bars.querySelectorAll('.bar-row').forEach((row, i) => {
      row.querySelector('.bar-inner').style.width = (ranked[i].p * 100).toFixed(1) + '%';
    });
  });
}

function renderTrain() {
  if (tStep >= STEPS.length) {
    // Done — all 3 steps predicted
    corpusLines.innerHTML = '';
    corpusHeader.textContent = '';
    predictBox.innerHTML = `<span class="ctx">${esc(TARGET)}</span>`;
    resultLine.innerHTML = '<span style="color:var(--green);">Complete &mdash; the model predicted every word by counting its training data.</span>';
    bars.innerHTML = '';
    barsTitle.textContent = '';
    btnPrimary.disabled = true;
    btnNext.disabled = true;
    return;
  }

  const prefix = getPrefix(tStep);
  const target = getTarget(tStep);
  const { matching, ranked, total } = matchCorpus(prefix);

  // Corpus lines
  const prefixStr = prefix.join(' ');
  corpusHeader.textContent = `training corpus &mdash; ${total} sentence${total === 1 ? '' : 's'} match "${prefixStr}"`;
  corpusHeader.innerHTML = corpusHeader.textContent; // allow entities

  corpusLines.innerHTML = CORPUS.map(sent => {
    const words = sent.split(' ');
    const sentPrefix = words.slice(0, prefix.length).join(' ');
    const isMatch = sentPrefix === prefixStr && words.length > prefix.length;

    if (!isMatch) {
      return `<div class="corpus-line nomatch">${esc(sent)}</div>`;
    }

    const prefixPart = words.slice(0, prefix.length).join(' ');
    const nextWord = words[prefix.length];
    const rest = words.slice(prefix.length + 1).join(' ');

    return `<div class="corpus-line match">`
      + `<span class="prefix">${esc(prefixPart)}</span> `
      + `<span class="nextw">${esc(nextWord)}</span>`
      + (rest ? ` <span class="rest">${esc(rest)}</span>` : '')
      + `</div>`;
  }).join('');

  // Predict box
  if (!tRevealed) {
    predictBox.innerHTML = `<span class="ctx">${esc(prefixStr)}</span> <span class="blank">___</span>`;
  } else {
    const topWord = ranked[0].word;
    const correct = topWord === target;
    predictBox.innerHTML = `<span class="ctx">${esc(prefixStr)}</span> `
      + `<span style="color:${correct ? 'var(--green)' : 'var(--red)'};">${esc(topWord)}</span>`;
  }

  // Result line
  if (!tRevealed) {
    resultLine.innerHTML = '';
  } else {
    const topWord = ranked[0].word;
    const correct = topWord === target;
    if (correct) {
      resultLine.innerHTML = `<span style="color:var(--green);">✓</span> "${esc(topWord)}" is correct &mdash; it appeared in ${ranked[0].count} of ${total} matching sentences.`;
    } else {
      resultLine.innerHTML = `<span style="color:var(--red);">✗</span> predicted "${esc(topWord)}" but the actual word is "${esc(target)}".`;
    }
  }

  // Bars
  renderTrainBars(ranked, total);

  // Buttons
  btnPrimary.disabled = tRevealed;
  btnPrimary.textContent = 'Predict →';
  btnPrimary.classList.toggle('primary', !tRevealed);
  btnNext.disabled = !tRevealed;
  btnNext.classList.toggle('primary', tRevealed);
}

function renderInferBars(cands) {
  const ranked = [...cands].sort((a, b) => b.p - a.p);
  bars.innerHTML = '';
  barsTitle.textContent = 'next-token probability';
  ranked.forEach((c, i) => {
    const row = document.createElement('div');
    row.className = 'bar-row' + (i === 0 ? ' top' : '');
    row.innerHTML = `
      <div class="word">${esc(c.word)}</div>
      <div class="bar-outer"><div class="bar-inner" style="width:0%"></div></div>
      <div class="pct">${(c.p * 100).toFixed(1)}%</div>
    `;
    bars.appendChild(row);
  });
  requestAnimationFrame(() => {
    bars.querySelectorAll('.bar-row').forEach((row, i) => {
      row.querySelector('.bar-inner').style.width = (ranked[i].p * 100).toFixed(1) + '%';
    });
  });
}

function renderInfer() {
  const header = `<span class="user-msg">User:</span> ${esc(INFER_PROMPT)}\n\n<span class="ai-label">AI:</span> `;
  const gen = inferTokens.join(' ').replace(/\s([,.;:])/g, '$1');
  const more = inferStep < INFER_STEPS.length;
  inferSentence.innerHTML = header
    + `<span class="generated">${esc(gen)}</span>`
    + (more ? ' <span class="cursor">_</span>' : '');
  if (more) {
    renderInferBars(INFER_STEPS[inferStep].candidates);
    btnPrimary.disabled = false;
    btnPrimary.textContent = 'Generate next token →';
    btnPrimary.classList.add('primary');
    btnNext.disabled = true;
    btnNext.style.display = 'none';
  } else {
    bars.innerHTML = '<div style="color:var(--muted); font-family:var(--mono); font-size:0.8rem; font-style:italic; padding:1rem 0;">(end of response)</div>';
    barsTitle.textContent = '';
    btnPrimary.disabled = true;
    btnPrimary.textContent = 'Done — reset to try again';
  }
}

// ─────────── Actions ───────────

function doPrimary() {
  if (mode === 'train') {
    if (tStep >= STEPS.length || tRevealed) return;
    tRevealed = true;
    renderTrain();
  } else {
    if (inferStep >= INFER_STEPS.length) return;
    const top = [...INFER_STEPS[inferStep].candidates].sort((a, b) => b.p - a.p)[0];
    inferTokens.push(top.word);
    inferStep += 1;
    renderInfer();
  }
}

function doNext() {
  if (mode !== 'train') return;
  if (tStep >= STEPS.length) return;
  tStep += 1;
  tRevealed = false;
  renderTrain();
}

function doReset() {
  stopAuto();
  setSpeed('manual');
  if (mode === 'train') {
    tStep = 0;
    tRevealed = false;
    btnNext.style.display = '';
    renderTrain();
  } else {
    inferStep = 0;
    inferTokens = [];
    renderInfer();
  }
}

function switchMode(m) {
  if (m === mode) return;
  mode = m;
  stopAuto();
  setSpeed('manual');
  if (m === 'train') {
    tabTrain.classList.add('active'); tabInfer.classList.remove('active');
    modeLabel.textContent = 'MODE: TRAINING — counting patterns';
    trainUI.style.display = '';
    inferUI.style.display = 'none';
    btnNext.style.display = '';
    tStep = 0; tRevealed = false;
    renderTrain();
  } else {
    tabInfer.classList.add('active'); tabTrain.classList.remove('active');
    modeLabel.textContent = 'MODE: INFERENCE — generating response';
    trainUI.style.display = 'none';
    inferUI.style.display = '';
    btnNext.style.display = 'none';
    renderInfer();
  }
}

// ─────────── Auto-advance ───────────
function setSpeed(s) {
  speed = s;
  for (const k in spdBtns) spdBtns[k].classList.toggle('active', k === s);
  stopAuto();
  if (s === 'manual') return;
  const delay = s === 'slow' ? 1600 : 600;
  autoTimer = setInterval(() => {
    if (mode === 'train') {
      if (tStep >= STEPS.length) { stopAuto(); setSpeed('manual'); return; }
      if (!tRevealed) { doPrimary(); }
      else { doNext(); }
    } else {
      if (inferStep >= INFER_STEPS.length) { stopAuto(); setSpeed('manual'); return; }
      doPrimary();
    }
  }, delay);
}
function stopAuto() { if (autoTimer) { clearInterval(autoTimer); autoTimer = null; } }

// ─────────── Wire up ───────────
tabTrain.addEventListener('click', () => switchMode('train'));
tabInfer.addEventListener('click', () => switchMode('infer'));
btnPrimary.addEventListener('click', doPrimary);
btnNext.addEventListener('click', doNext);
btnReset.addEventListener('click', doReset);
showSys.addEventListener('change', (e) => {
  systemPrompt.classList.toggle('hidden', !e.target.checked);
});
spdBtns.manual.addEventListener('click', () => setSpeed('manual'));
spdBtns.slow.addEventListener('click',   () => setSpeed('slow'));
spdBtns.fast.addEventListener('click',   () => setSpeed('fast'));

// Keyboard
window.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') {
    e.preventDefault();
    if (mode === 'train' && tRevealed) doNext();
    else doPrimary();
  }
});

// init
renderTrain();
</script>
</body>
</html>
